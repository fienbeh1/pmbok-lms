<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PMBOK LMS{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1><a href="/">PMBOK® LMS</a></h1>
        <nav>
            <a href="/">Inicio</a>
            <a href="/study">Estudiar</a>
            <a href="/quiz">Quiz</a>
        </nav>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        document.querySelectorAll('.qa-item').forEach(el => {
            el.addEventListener('click', () => el.classList.toggle('active'));
        });
    </script>
</body>
</html>
