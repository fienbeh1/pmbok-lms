<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}🌸 PMBOK LMS - Rosalinda{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div style="display:flex;align-items:center;gap:0.5rem">
            <button class="hamburger" onclick="toggleMobileMenu()" aria-label="Menú">☰</button>
            <span class="flowers">🌸🌷🌺</span>
            <h1><a href="/">PMBOK® LMS <span class="sub">Curso de Dirección de Proyectos</span></a></h1>
        </div>
        <div class="nav-menu" id="navMenu">
            <a href="/">🌸 Inicio</a>
            <a href="/study">📖 Estudiar</a>
            <a href="/flipcards">🃏 Cards</a>
            <a href="/quiz">✨ Quiz</a>
            <a href="/notes">📝 Notas</a>
        </div>
    </header>

    <div class="sidebar-toggle" onclick="toggleSidebar()">📋</div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>🌸 Capítulos</h3>
            <button onclick="toggleSidebar()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:white">✕</button>
        </div>
        <div class="sidebar-content">
            {% for slug, title in CHAPTER_TITLES.items() %}
            <a href="/chapter/{{ slug }}" class="sidebar-item">
                <span class="sidebar-num">{{ loop.index }}</span>
                <span>{{ title }}</span>
            </a>
            {% endfor %}
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        🌸 PMBOK 7ª Edición — Proyecto Educativo 🌸
    </footer>

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }
    function toggleMobileMenu() {
        document.getElementById('navMenu').classList.toggle('open');
    }
    document.querySelectorAll('.qa-item').forEach(el => {
        el.addEventListener('click', () => el.classList.toggle('active'));
    });
    document.addEventListener('click', function(e) {
        const nav = document.getElementById('navMenu');
        const ham = document.querySelector('.hamburger');
        if (!nav.contains(e.target) && !ham.contains(e.target) && nav.classList.contains('open')) {
            nav.classList.remove('open');
        }
    });
    </script>
</body>
</html>
