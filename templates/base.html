<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}🌸 PMBOK LMS - Rosalinda{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div>
            <span class="flowers">🌸🌷🌺🌷🌸</span>
            <h1><a href="/">PMBOK® LMS <span class="sub">Curso de Dirección de Proyectos</span></a></h1>
        </div>
        <nav>
            <a href="/">🌸 Inicio</a>
            <a href="/study">📖 Estudiar</a>
            <a href="/flipcards">🃏 Flip Cards</a>
            <a href="/quiz">✨ Quiz</a>
            <a href="/notes">📝 Notas</a>
        </nav>
    </header>

    <div class="sidebar-toggle" onclick="toggleSidebar()">📋</div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>🌸 Capítulos</h3>
            <button onclick="toggleSidebar()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--primary)">✕</button>
        </div>
        <div class="sidebar-content">
            {% for slug, title in CHAPTER_TITLES.items() %}
            <a href="/chapter/{{ slug }}" class="sidebar-item">
                <span class="sidebar-num">{{ loop.index }}</span>
                <span>{{ title }}</span>
            </a>
            {% endfor %}
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        🌸 PMBOK 7ª Edición — Proyecto Educativo 🌸
    </footer>

    <style>
    .sidebar {
        position: fixed;
        left: -320px;
        top: 0;
        bottom: 0;
        width: 300px;
        background: linear-gradient(180deg, #fff0f5, #ffe4ec);
        border-right: 2px solid var(--pink-2);
        z-index: 1000;
        transition: left 0.3s ease;
        box-shadow: 4px 0 20px rgba(232,67,147,0.1);
        overflow-y: auto;
    }
    .sidebar.open { left: 0; }
    .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.2rem;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;
    }
    .sidebar-header h3 { margin: 0; }
    .sidebar-content { padding: 0.5rem; }
    .sidebar-item {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        padding: 0.7rem 1rem;
        text-decoration: none;
        color: var(--text);
        border-radius: 10px;
        margin: 0.2rem 0;
        transition: all 0.2s;
    }
    .sidebar-item:hover {
        background: rgba(232,67,147,0.1);
        color: var(--primary);
    }
    .sidebar-num {
        width: 28px;
        height: 28px;
        background: var(--primary);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 600;
        flex-shrink: 0;
    }
    .sidebar-toggle {
        position: fixed;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;
        padding: 0.8rem 0.5rem;
        border-radius: 0 12px 12px 0;
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 999;
        transition: all 0.2s;
        box-shadow: 2px 2px 8px rgba(232,67,147,0.2);
    }
    .sidebar-toggle:hover { padding-right: 0.8rem; }
    .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 999;
    }
    .overlay.show { display: block; }
    </style>

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('show');
    }
    document.querySelectorAll('.qa-item').forEach(el => {
        el.addEventListener('click', () => el.classList.toggle('active'));
    });
    </script>
</body>
</html>
